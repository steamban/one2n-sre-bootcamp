apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-admin
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  selector:
    matchLabels:
      app: external-secrets
  template:
    metadata:
      labels:
        app: external-secrets
    spec:
      serviceAccountName: external-secrets
      nodeSelector:
        type: dependent_services # Forces ESO Controller onto Node C
      containers:
        - name: controller
          image: ghcr.io/external-secrets/external-secrets:v2.4.0
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: external-secrets
stringData:
  token: root
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          key: "token"
          namespace: "external-secrets"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: student-api-db-creds
  namespace: student-api
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: student-api-db-creds
  data:
    - secretKey: DB_USER
      remoteRef: { key: student-api/db, property: username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: student-api/db, property: password }
    - secretKey: DB_NAME
      remoteRef: { key: student-api/db, property: dbname }
    - secretKey: POSTGRES_USER
      remoteRef: { key: student-api/db, property: username }
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: student-api/db, property: password }
    - secretKey: POSTGRES_DB
      remoteRef: { key: student-api/db, property: dbname }