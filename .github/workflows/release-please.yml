name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: go
          package-name: student-api
          token: ${{ secrets.GPAT }}