name: CI

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - '**/Makefile'
      - '**/Dockerfile'
      - '**/go.mod'
      - '**/go.sum'
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - '**/Makefile'
      - '**/Dockerfile'
      - '**/go.mod'
      - '**/go.sum'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag for test image'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Code Linting
        run: |
          make fmt
          make vet

  test:
    name: Test
    needs: [lint]
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Tests
        run: make test

  docker:
    name: Docker Build and Push
    needs: [test]
    runs-on: [self-hosted, linux, ARM64]
    if: github.event_name != 'workflow_dispatch' || github.ref_name != 'main'
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tags=${{ secrets.DOCKER_USERNAME }}/student-api-test:${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tags=${{ secrets.DOCKER_USERNAME }}/student-api-test:pr-${{ github.event.pull_request.number }}-${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/student-api-test:pr-${{ github.event.pull_request.number }}-latest" >> $GITHUB_OUTPUT
          else
            echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
            echo "tags=${{ secrets.DOCKER_USERNAME }}/student-api:0.0.0-${{ env.short_sha }},${{ secrets.DOCKER_USERNAME }}/student-api:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}