name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'migrations/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build API
        run: make build

  test:
    name: Test
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run Tests
        run: make test

  lint:
    name: Lint
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Code Linting
        run: |
          make fmt
          make vet

  security-scan:
    name: Security Scan
    runs-on: [self-hosted, linux, ARM64]
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          staticcheck ./...