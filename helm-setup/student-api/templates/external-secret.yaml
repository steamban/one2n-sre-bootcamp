apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: student-api-db-creds
  labels:
    {{- include "student-api.labels" . | nindent 4 }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: student-api-db-creds
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: student-api/db
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: student-api/db
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: student-api/db
        property: dbname