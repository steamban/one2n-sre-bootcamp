apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "student-api.fullname" . }}
  labels:
    {{- include "student-api.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "student-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "student-api.selectorLabels" . | nindent 8 }}
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for postgres to be ready..."
              until nc -z {{ .Values.configMap.DB_HOST }} {{ .Values.configMap.DB_PORT }}; do
                echo "Waiting for database connection..."
                sleep 2
              done
              echo "Database is ready!"
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/sh
            - -c
            - ./migrate up
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: DB_PORT
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: DB_SSLMODE
            - name: DB_USER            
              valueFrom:
                secretKeyRef:
                  name: student-api-db-creds
                  key: POSTGRES_USER   
            - name: DB_PASSWORD        
              valueFrom:
                secretKeyRef:
                  name: student-api-db-creds
                  key: POSTGRES_PASSWORD
            - name: DB_NAME            
              valueFrom:
                secretKeyRef:
                  name: student-api-db-creds
                  key: POSTGRES_DB
      containers:
        - name: student-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: DB_PORT
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "student-api.fullname" . }}-config
                  key: DB_SSLMODE
            - name: DB_USER            
              valueFrom:
                secretKeyRef:
                  name: student-api-db-creds
                  key: POSTGRES_USER   
            - name: DB_PASSWORD        
              valueFrom:
                secretKeyRef:
                  name: student-api-db-creds
                  key: POSTGRES_PASSWORD
            - name: DB_NAME            
              valueFrom:
                secretKeyRef:
                  name: student-api-db-creds
                  key: POSTGRES_DB
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
      {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 10 }}
      {{- end }}