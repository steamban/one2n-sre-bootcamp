apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-exporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/depends-on: prometheus
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-postgres-exporter
    targetRevision: 7.5.2
    helm:
      values: |
        config:
          datasource:
            host: student-api-postgresql.student-api.svc
            port: "5432"
            userSecret:
              name: postgres-exporter-password
              key: user
            passwordSecret:
              name: postgres-exporter-password
              key: password
            database: student_db
            sslmode: disable

        nodeSelector:
          type: dependent_services

        serviceMonitor:
          enabled: true
          interval: 30s
          namespace: observability
          labels:
            release: prometheus

        replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m