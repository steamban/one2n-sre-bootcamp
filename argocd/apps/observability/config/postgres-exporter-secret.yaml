apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-exporter-creds
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-exporter-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/student-api/db
        property: password
    - secretKey: user
      remoteRef:
        key: secret/student-api/db
        property: username
