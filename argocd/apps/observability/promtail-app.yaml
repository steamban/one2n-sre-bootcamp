apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/depends-on: loki
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.17.1
    helm:
      values: |
        config:
          logLevel: info
          serverPort: 3101
          clients:
            - url: http://loki.observability.svc:3100/loki/api/v1/push
          snippets:
            extraRelabelConfigs:
              - action: keep
                source_labels:
                  - __meta_kubernetes_namespace
                regex: student-api
        
        # Use tcpSocket for readiness to avoid 500 errors when no logs are found
        readinessProbe:
          httpGet: null
          tcpSocket:
            port: 3101
            
        tolerations:
          - effect: NoSchedule
            operator: Exists
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
