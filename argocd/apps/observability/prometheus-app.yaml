apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 84.5.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            additionalScrapeConfigs:
              - job_name: blackbox-http
                metrics_path: /probe
                params:
                  module: [http_2xx]
                static_configs:
                  - targets:
                      - http://argocd-server.argocd.svc:80/healthz
                    labels:
                      service: argocd
                      group: endpoints
                  - targets:
                      - http://vault.vault.svc.cluster.local:8200/v1/sys/health
                    labels:
                      service: vault
                      group: endpoints
                  - targets:
                      - http://student-api.student-api.svc:8080/healthcheck
                    labels:
                      service: student-api
                      group: endpoints
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: __param_target
                  - source_labels: [__param_target]
                    target_label: instance
                  - target_label: __address__
                    replacement: blackbox-exporter-prometheus-blackbox-exporter.observability.svc:9115
            nodeSelector:
              type: dependent_services

        grafana:
          enabled: true
          nodeSelector:
            type: dependent_services
          adminPassword: prom-operator

          dashboards:
            default:
              node-exporter:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
              kubernetes:
                gnetId: 13332
                revision: 1
                datasource: Prometheus
              postgres:
                gnetId: 9628
                revision: 7
                datasource: Prometheus
              blackbox:
                gnetId: 7587
                revision: 3
                datasource: Prometheus

          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.observability.svc:3100
              access: proxy
              isDefault: false

          sidecar:
            datasources:
              enabled: true
            dashboards:
              enabled: true

        kubeStateMetrics:
          enabled: true
          nodeSelector:
            type: dependent_services

        prometheus-node-exporter:
          enabled: true
          nodeSelector:
            type: dependent_services

        alertmanager:
          enabled: true
          alertmanagerSpec:
            nodeSelector:
              type: dependent_services
            config:
              global:
                slack_api_url: 'http://REPLACE_WITH_ACTUAL_WEBHOOK'
              route:
                group_by: ['alertname', 'service']
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 12h
                receiver: 'slack-notifications'
              receivers:
                - name: 'slack-notifications'
                  slack_configs:
                    - channel: '#alerts'
                      send_resolved: true
                      title: '{{ .CommonLabels.alertname }}'
                      text: '{{ .CommonAnnotations.summary }}'
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m