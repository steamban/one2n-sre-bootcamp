apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "student-api.fullname" . }}-db-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "student-api.labels" . | nindent 4 }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: {{ include "student-api.fullname" . }}-vault-store
    kind: SecretStore
  target:
    name: student-api-db-creds
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: student-api/db
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: student-api/db
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: student-api/db
        property: dbname
